version: '3.8'

services:
  nic-app:
    build: .
    ports:
      - "8080:8080"
    volumes:
      # Persist SQLite database
      - nic-data:/data
    environment:
      # JVM options
      - JAVA_OPTS=-Xmx512m -Xms256m
      # Timezone
      - TZ=UTC
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  nic-data:
